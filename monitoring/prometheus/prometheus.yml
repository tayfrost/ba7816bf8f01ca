global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api'
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8000']

  - job_name: 'webhooks'
    metrics_path: /metrics
    static_configs:
      - targets: ['webhooks:8000']

  - job_name: 'kg-mcp-server'
    metrics_path: /metrics
    static_configs:
     - targets: ['kg-mcp-server:8001']

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
