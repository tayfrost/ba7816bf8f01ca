syntax = "proto3";

package sentinelai.filter.v1;

service FilterService {
  rpc ClassifyMessage(ClassifyRequest) returns (ClassifyResponse);
  rpc ClassifyMessageWithModel(ModelClassifyRequest) returns (ClassifyResponse);
}

message ClassifyRequest {
  string message = 1;
}

message ModelClassifyRequest {
  string message = 1;
  string model_name = 2;  // Options: "fp32", "fp16", "dynamic_int8", "static_int8"
}

message ClassifyResponse {
  string category = 1;
  float category_confidence = 2;
  string severity = 3;
  float severity_confidence = 4;
  bool is_risk = 5;
  string all_responses = 6;
}
