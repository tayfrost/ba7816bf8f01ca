syntax = "proto3";

package sentinelai.filter.v1;

service FilterService {
  rpc ClassifyMessage(ClassifyRequest) returns (ClassifyResponse);
  rpc ClassifyMessages(BatchClassifyRequest) returns (BatchClassifyResponse);
}

message ClassifyRequest {
  string message = 1;
}

message ClassifyResponse {
  string category = 1;
  float category_confidence = 2;
  string severity = 3;
  float severity_confidence = 4;
  bool is_risk = 5;
  string all_responses = 6;
}

message BatchClassifyRequest {
  repeated string messages = 1;
}

message BatchClassifyResponse {
  repeated ClassifyResponse results = 1;
}
