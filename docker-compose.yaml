version: '3.8'

services:
  webhooks:
    build: ./webhooks
    ports:
      - "8000:8000"
    env_file:
      - ./webhooks/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@pgvector:5432/sentinelai
    depends_on:
      - pgvector
    restart: unless-stopped

  payments:
    build: ./payments
    ports:
      - "8001:8001"
    env_file:
      - ./payments/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@pgvector:5432/sentinelai
    depends_on:
      - pgvector
    restart: unless-stopped

  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=sentinelai
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgvector_data:
