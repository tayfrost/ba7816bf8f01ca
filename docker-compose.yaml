version: '3.8'

services:

  ai_service:
    build:
      context: .
      dockerfile: ai_service/Dockerfile
    ports:
      - "8002:8001"
    depends_on:
      - kg-mcp-server
    env_file:
      - ./ai_service/.env
    networks:
      - sentinelai

  filter:
    build:
      context: .
      dockerfile: filter/Dockerfile
    ports:
      - "50051:50051"
      - "9192:8000"
    volumes:
      - filter_models:/app/models
    environment:
      - INFERENCE_BACKEND=pytorch
    # restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 50051), timeout=2)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - sentinelai

  webhooks:
    build:
      context: .
      dockerfile: webhooks/Dockerfile
    ports:
      - "9000:8000"
    env_file:
      - ./webhooks/.env
    depends_on:
      pgvector:
        condition: service_started
      filter:
        condition: service_healthy
      ai_service:
        condition: service_started
    # restart: unless-stopped
    networks:
      - sentinelai

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8006:8000"
    env_file:
      - ./api/.env
    depends_on:
      - pgvector
    # restart: unless-stopped
    networks:
      - sentinelai

  pgvector:
    image: pgvector/pgvector:pg16
    env_file:
      - ./.env
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    # restart: unless-stopped
    networks:
      - sentinelai

  kg-mcp-server:
    build:
      context: .
      dockerfile: knowledge-graph/mcp-server/Dockerfile
    ports:
      - "8001:8001"
      - "9102:9102"
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8001
      - KG_DATA_PATH=/app/data/papers.json
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 8001))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - sentinelai

  neo4j:
    image: neo4j:5.15-community
    container_name: sentinelai-neo4j
    profiles: ["dev"]
    ports:
      - "7474:7474"
      - "7687:7687"
    env_file:
      - ./.env.neo4j
    environment:
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 512m
    volumes:
      - neo4j_data:/data
    # restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinelai

