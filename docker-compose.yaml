  sentinel-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentinel-frontend
    ports:
      - "8080:80"
    # restart: unless-stopped
    networks:
      - sentinelai

  payments:
    build: ./payments
    ports:
      - "8004:8001"
    env_file:
      - ./payments/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@pgvector:5432/sentinelai
    depends_on:
      - pgvector
    # restart: unless-stopped
    networks:
      - sentinelai

networks:
  sentinelai:
    driver: bridge

